services:
  stirling-pdf:
    # Variante COMPLETA (todas as ferramentas + fontes/OCR extras). Outras tags:
    #   latest            -> padrão (inclui OCR)
    #   latest-ultra-lite -> mínimo, sem OCR/conversões pesadas (hardware fraco)
    image: stirlingtools/stirling-pdf:latest-fat
    container_name: stirling-pdf
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    environment:
      TZ: America/Sao_Paulo
      # A imagem sobe como root e dropa privilégios para este UID/GID.
      # Faça `sudo chown -R 1000:1000 /srv/pdf` ANTES do 1º boot (evita EACCES).
      PUID: "${STIRLING_UID:-1000}"
      PGID: "${STIRLING_GID:-1000}"
      UMASK: "022"
      # --- Interface ---
      SYSTEM_DEFAULTLOCALE: pt-BR
      UI_APPNAME: Stirling-PDF
      SYSTEM_FILEUPLOADLIMIT: "100MB"           # teto de upload (protege a placa); "" = sem limite
      SYSTEM_ENABLEANALYTICS: "false"           # desliga telemetria
      METRICS_ENABLED: "true"                   # NÃO desligar: o healthcheck usa /api/v1/info/status
      # --- Login nativo DESATIVADO (app aberto atrás do Authelia) ------------------
      # Receita OFICIAL da v2 para rodar SEM autenticação (docs.stirlingpdf.com ->
      # Configuration/System and Security -> "Running Without Authentication", Opção 1):
      # é a DUPLA abaixo, não uma flag só —
      #   * SECURITY_ENABLELOGIN=false        desliga login/contas: sem tela de login,
      #                                       sem /api/v1/auth/*, sem teto de 5 usuários.
      #   * DISABLE_ADDITIONAL_FEATURES=false OBRIGATÓRIO p/ o enableLogin ser respeitado
      #     (doc: "enableLogin só disponível com DISABLE_ADDITIONAL_FEATURES=false").
      # Não habilita nada pago: as features `enterprise` seguem travadas por licença.
      # Quem autentica é o Authelia na frente (../../docs/authelia.md).
      #
      # ⚠️ v1->v2: NÃO use DISABLE_ADDITIONAL_FEATURES=true para "abrir" o app. Na
      # v2.14.0 essa flag só desativa o grupo `enterprise`; o login continua ATIVO
      # (cria admin + banco + trava de 5) e você cai em login DUPLO com o Authelia.
      DISABLE_ADDITIONAL_FEATURES: "false"
      SECURITY_ENABLELOGIN: "false"
      # Esconde a tela de CONFIGURAÇÕES da UI para todos. Você administra pelo
      # settings.yml em /srv/pdf/config + env do Portainer = config só com quem
      # tem acesso ao host (você).
      SYSTEM_SHOWSETTINGSWHENNOLOGIN: "false"
    volumes:
      # settings.yml + banco/estado -> dado crítico p/ backup
      - /srv/pdf/config:/configs
      # idiomas do OCR: precisa conter eng + por + osd (ver guia)
      - /srv/pdf/tessdata:/usr/share/tesseract-ocr/5/tessdata
      # logs da aplicação
      - /srv/pdf/logs:/logs
      # pipelines de automação (opcional)
      - /srv/pdf/pipeline:/pipeline
      # arquivos custom (logo/CSS/termos) — opcional
      # - /srv/pdf/customFiles:/customFiles
    # SEM porta no host: o Caddy alcança pela rede `caddy-net` como
    # http://stirling-pdf:8080 e publica em https://pdf.selflabs.org (via Authelia).
    networks:
      - caddy-net
    expose:
      - "8080"
    hostname: stirling-pdf
    healthcheck:
      # endpoint público de status do Stirling-PDF (retorna "UP" quando pronto)
      test: ["CMD-SHELL", "curl -f http://localhost:8080/api/v1/info/status | grep -q 'UP'"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 120s                        # Java + LibreOffice demoram a subir (ARM)
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

networks:
  caddy-net:
    name: caddy-net
    external: true                              # docker network create caddy-net
