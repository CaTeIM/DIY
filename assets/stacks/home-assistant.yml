name: "homeassistant"
services:
  homeassistant:
    container_name: homeassistant
    image: ghcr.io/home-assistant/home-assistant:stable
    privileged: true
    restart: unless-stopped
    environment:
      - TZ=America/Sao_Paulo
    volumes:
      - /srv/homeassistant:/config
      - /run/dbus:/run/dbus:ro
      - /etc/localtime:/etc/localtime:ro
    networks:
      - homeassistant-net
    ports:
      - "8123:8123"
#      - "4357:4357"
    hostname: homeassistant

  esphome:
    container_name: esphome
    image: ghcr.io/esphome/esphome:latest
    privileged: true
    restart: always
    environment:
      - TZ=America/Sao_Paulo
      - USERNAME=${ESPHOME_USERNAME}
      - PASSWORD=${ESPHOME_PASSWORD}
    volumes:
      - /srv/esphome:/config
      - /etc/localtime:/etc/localtime:ro
    networks:
      - homeassistant-net
    hostname: esphome

  mosquitto:
    container_name: mosquitto
    image: eclipse-mosquitto:latest
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    user: "1883:1883"
    volumes:
      - /srv/mosquitto/config:/mosquitto/config
      - /srv/mosquitto/data:/mosquitto/data
      - /srv/mosquitto/log:/mosquitto/log
      - /etc/localtime:/etc/localtime:ro
    networks:
      - homeassistant-net
    ports:
      - "1883:1883"
    hostname: mosquitto

  nodered:
    container_name: nodered
    image: nodered/node-red:latest
    restart: unless-stopped
    environment:
      - TZ=America/Sao_Paulo
    volumes:
      - /srv/nodered:/data
      - /etc/localtime:/etc/localtime:ro
    network_mode: host

  file-editor:
    container_name: file-editor
    image: causticlab/hass-configurator-docker:latest
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    environment:
      - TZ=America/Sao_Paulo
      - HC_USERNAME=${FILE_EDITOR_USERNAME}
      - HC_PASSWORD=${FILE_EDITOR_PASSWORD}
      - HC_HASS_API=http://homeassistant:8123
      - HC_HASS_TOKEN=${FILE_EDITOR_TOKEN}
      - HC_BASEPATH=/config
      - HC_HASS_SSL=false
      - HC_DIRSFIRST=true
      - HC_ENFORCE_BASEPATH=false
      - HC_GIT=true
    volumes:
      - /srv/homeassistant:/config
      - /etc/localtime:/etc/localtime:ro
    networks:
      - homeassistant-net
    ports:
      - "3218:3218"
    hostname: file-editor

  habridge:
    container_name: habridge
    image: lscr.io/linuxserver/habridge:latest
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=America/Sao_Paulo
      - SEC_KEY=${HABRIDGE_SEC_KEY:-}
    volumes:
      - /srv/habridge:/config
      - /etc/localtime:/etc/localtime:ro
    # Rede do host: o discovery da Alexa usa multicast UPnP/SSDP (UDP 1900), que não
    # passa pela rede bridge do Docker. A porta web fica em 80 (no ha-bridge.config),
    # pois a Alexa faz a API Hue na porta 80 fixa. Como o container roda como não-root,
    # o host precisa de: sysctl net.ipv4.ip_unprivileged_port_start=80.
    # Detalhes em docs/home-assistant.md (Passos 1.6/1.7 e Seção 6).
    network_mode: host

networks:
  homeassistant-net:
    name: homeassistant-net
    driver: bridge