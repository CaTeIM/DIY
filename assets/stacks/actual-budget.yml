services:
  actual_server:
    image: actualbudget/actual-server:latest-alpine
    container_name: actual-budget
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    environment:
      - TZ=America/Sao_Paulo
    volumes:
      - /srv/actualbudget/data:/data
    networks:
      - actual-budget-net
    ports:
      - '5006:5006'
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

networks:
  actual-budget-net:
    name: actual-budget-net
    driver: bridge
