services:
  n8n:
    image: docker.n8n.io/n8nio/n8n
    container_name: n8n
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    environment:
      # --- Banco de dados (PostgreSQL dedicado) ---
      - DB_TYPE=postgresdb
      - DB_POSTGRESDB_HOST=n8n-db
      - DB_POSTGRESDB_PORT=5432
      - DB_POSTGRESDB_DATABASE=n8n
      - DB_POSTGRESDB_USER=n8n
      - DB_POSTGRESDB_PASSWORD=${N8N_DB_PASSWORD}
      # --- Criptografia das credenciais (NUNCA perca/troque esta chave) ---
      - N8N_ENCRYPTION_KEY=${N8N_ENCRYPTION_KEY}
      # --- URL publica / proxy (o Cloudflare Tunnel termina o TLS) ---
      - N8N_HOST=${N8N_HOST}
      - N8N_PROTOCOL=http
      - N8N_PORT=5678
      - WEBHOOK_URL=https://${N8N_HOST}/
      - N8N_EDITOR_BASE_URL=https://${N8N_HOST}/
      - N8N_PROXY_HOPS=1
      # --- Fuso horario (cron/agendamentos usam GENERIC_TIMEZONE) ---
      - GENERIC_TIMEZONE=America/Sao_Paulo
      - TZ=America/Sao_Paulo
      # --- Higiene (opcional): nao enviar telemetria anonima ---
      - N8N_DIAGNOSTICS_ENABLED=false
    volumes:
      - /srv/n8n/data:/home/node/.n8n
    networks:
      - n8n-net
      - radar-net
    ports:
      - '5678:5678'
    depends_on:
      n8n-db:
        condition: service_healthy
    logging:
      driver: 'json-file'
      options:
        max-size: '10m'
        max-file: '3'

  n8n-db:
    image: postgres:16-alpine
    container_name: n8n-db
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    environment:
      - POSTGRES_USER=n8n
      - POSTGRES_PASSWORD=${N8N_DB_PASSWORD}
      - POSTGRES_DB=n8n
    volumes:
      - /srv/n8n/db:/var/lib/postgresql/data
    networks:
      - n8n-net
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U n8n -d n8n']
      interval: 10s
      timeout: 5s
      retries: 5
    logging:
      driver: 'json-file'
      options:
        max-size: '10m'
        max-file: '3'

networks:
  n8n-net:
    name: n8n-net
    driver: bridge
  # radar-net e criada pela stack do radar; o n8n entra nela p/ alcancar evo-postgres + radar-backend.
  radar-net:
    name: radar-net
    external: true
