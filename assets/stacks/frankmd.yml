services:
  frankmd:
    image: akitaonrails/frankmd:latest
    container_name: frankmd
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    # Roda como o usuario do host (UID/GID 1000 por padrao) -> evita EACCES nos bind mounts
    user: "${FRANKMD_UID:-1000}:${FRANKMD_GID:-1000}"
    environment:
      # --- Base ---
      - SECRET_KEY_BASE=${FRANKMD_SECRET_KEY_BASE}
      - NOTES_PATH=/rails/notes
      - IMAGES_PATH=/rails/images
      - EXTERNAL_PORT=7591
      - FRANKMD_LOCALE=pt-BR
      - TZ=America/Sao_Paulo
      # --- IA: correcao gramatical / geracao de imagem (Google Gemini) ---
      - AI_PROVIDER=gemini
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - GEMINI_MODEL=gemini-flash-latest
      # --- Busca no YouTube (YouTube Data API v3) ---
      - YOUTUBE_API_KEY=${YOUTUBE_API_KEY}
    volumes:
      # As notas (.md) sao o dado real do app; images guarda as imagens locais
      - /srv/frankmd/notes:/rails/notes
      - /srv/frankmd/images:/rails/images
    network_mode: bridge
    ports:
      - "7591:80"
    hostname: frankmd
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:80/up"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
