# ============================================================================
# Authelia — configuration.yml  (selflabs.org / Orange Pi 5 arm64)
# Guia: ../../docs/authelia.md   Stack: ../stacks/authelia.yml
#
# Segredos NÃO ficam aqui: são injetados pelo mecanismo NATIVO de env do
# Authelia (AUTHELIA_SESSION_SECRET, AUTHELIA_STORAGE_ENCRYPTION_KEY,
# AUTHELIA_IDENTITY_VALIDATION_RESET_PASSWORD_JWT_SECRET,
# AUTHELIA_AUTHENTICATION_BACKEND_LDAP_PASSWORD) — ver a stack e o .env.
# Por isso NÃO usamos o filtro `template`/${VAR} (que some no Authelia 4.40).
#
# Grave este arquivo em /srv/authelia/config/configuration.yml no host.
# ============================================================================

theme: 'auto'

server:
  # Authelia escuta em 9091 dentro do container; o Caddy alcança como
  # http://authelia:9091 pela rede auth-net. Os endpoints de authz (incluindo
  # /api/authz/forward-auth) já vêm habilitados por padrão — não sobrescreva.
  address: 'tcp://:9091/'

log:
  level: 'info'
  format: 'text'

# Substitui o antigo jwt_secret de topo (removido no 4.38). O segredo em si
# vem da env AUTHELIA_IDENTITY_VALIDATION_RESET_PASSWORD_JWT_SECRET.
identity_validation:
  reset_password:
    jwt_lifespan: '5 minutes'
    jwt_algorithm: 'HS256'

# Primeiro fator: backend LDAP apontando para o lldap (perfil 'lldap' já
# preseta filtros/atributos). A senha de bind vem da env
# AUTHELIA_AUTHENTICATION_BACKEND_LDAP_PASSWORD.
authentication_backend:
  password_reset:
    disable: false
  refresh_interval: '1m'
  ldap:
    implementation: 'lldap'
    address: 'ldap://lldap:3890'
    timeout: '5s'
    start_tls: false
    base_dn: 'dc=selflabs,dc=org'
    additional_users_dn: 'ou=people'
    additional_groups_dn: 'ou=groups'
    # Conta de serviço criada na UI do lldap, membro de lldap_strict_readonly.
    user: 'uid=authelia,ou=people,dc=selflabs,dc=org'
    users_filter: '(&(|({username_attribute}={input})({mail_attribute}={input}))(objectClass=person))'
    groups_filter: '(&(member={dn})(objectClass=groupOfNames))'
    attributes:
      username: 'uid'
      display_name: 'cn'
      mail: 'mail'
      group_name: 'cn'
      member_of: 'memberOf'

# Nega por padrão; protege os apps com fator único (usuário/senha do lldap) e
# libera o próprio portal. Para exigir 2FA num app, troque para 'two_factor'.
access_control:
  default_policy: 'deny'
  rules:
    - domain: 'auth.selflabs.org'
      policy: 'bypass'
    - domain: 'users.selflabs.org'
      policy: 'one_factor'
    - domain: 'pdf.selflabs.org'
      policy: 'one_factor'
    # Exemplo p/ restringir a um grupo do lldap:
    # - domain: 'pdf.selflabs.org'
    #   policy: 'one_factor'
    #   subject: ['group:admins']

# Sessão em memória (SEM Redis). O cookie no domínio-pai selflabs.org faz um
# login cobrir todos os *.selflabs.org (SSO). secret vem de AUTHELIA_SESSION_SECRET.
session:
  cookies:
    - domain: 'selflabs.org'
      authelia_url: 'https://auth.selflabs.org'
      default_redirection_url: 'https://pdf.selflabs.org'
      name: 'authelia_session'
      same_site: 'lax'
      inactivity: '5m'
      expiration: '1h'
      remember_me: '1M'

# Storage local SQLite (SEM Postgres). encryption_key vem de
# AUTHELIA_STORAGE_ENCRYPTION_KEY (obrigatório; FAÇA BACKUP).
storage:
  local:
    path: '/config/db.sqlite3'

# Notificador em arquivo (sem SMTP). E-mails de reset/registro 2FA são escritos
# aqui; para completá-los, leia o arquivo:
#   docker exec authelia cat /config/notification.txt
notifier:
  disable_startup_check: false
  filesystem:
    filename: '/config/notification.txt'

totp:
  issuer: 'selflabs.org'
  period: 30
  skew: 1
