# ============================================================================
# Authelia — configuration.yml  (selflabs.org)
# Guia: ../../docs/authelia.md   Stack: ../stacks/authelia.yml
#
# Segredos NÃO ficam aqui: são injetados pelo mecanismo NATIVO de env do
# Authelia (AUTHELIA_SESSION_SECRET, AUTHELIA_STORAGE_ENCRYPTION_KEY,
# AUTHELIA_IDENTITY_VALIDATION_RESET_PASSWORD_JWT_SECRET,
# AUTHELIA_AUTHENTICATION_BACKEND_LDAP_PASSWORD) — ver a stack e o .env.
# Por isso NÃO usamos o filtro `template`/${VAR} (que some no Authelia 4.40).
#
# Grave este arquivo em /srv/authelia/config/configuration.yml no host.
# ============================================================================

theme: 'auto'

server:
  # Authelia escuta em 9091 dentro do container; o Caddy alcança como
  # http://authelia:9091 pela rede auth-net. Os endpoints de authz (incluindo
  # /api/authz/forward-auth) já vêm habilitados por padrão — não sobrescreva.
  address: 'tcp://:9091/'

log:
  level: 'info'
  format: 'text'

# Substitui o antigo jwt_secret de topo (removido no 4.38). O segredo em si
# vem da env AUTHELIA_IDENTITY_VALIDATION_RESET_PASSWORD_JWT_SECRET.
identity_validation:
  reset_password:
    jwt_lifespan: '5 minutes'
    jwt_algorithm: 'HS256'

# Primeiro fator: backend LDAP apontando para o lldap (perfil 'lldap' já
# preseta filtros/atributos). A senha de bind vem da env
# AUTHELIA_AUTHENTICATION_BACKEND_LDAP_PASSWORD.
authentication_backend:
  password_reset:
    disable: false
  refresh_interval: '1m'
  ldap:
    implementation: 'lldap'
    address: 'ldap://lldap:3890'
    timeout: '5s'
    start_tls: false
    base_dn: 'dc=selflabs,dc=org'
    additional_users_dn: 'ou=people'
    additional_groups_dn: 'ou=groups'
    # Conta de serviço criada na UI do lldap, membro de lldap_strict_readonly.
    user: 'uid=authelia,ou=people,dc=selflabs,dc=org'
    users_filter: '(&(|({username_attribute}={input})({mail_attribute}={input}))(objectClass=person))'
    groups_filter: '(&(member={dn})(objectClass=groupOfNames))'
    attributes:
      username: 'uid'
      display_name: 'cn'
      mail: 'mail'
      group_name: 'cn'
      member_of: 'memberOf'

# Nega por padrão; exige 2FA (senha do lldap + TOTP) nos apps e libera só o portal.
# Para um app menos sensível, troque 'two_factor' por 'one_factor' (só senha).
access_control:
  default_policy: 'deny'
  rules:
    - domain: 'auth.selflabs.org'
      policy: 'bypass'
    - domain: 'users.selflabs.org'
      policy: 'two_factor'
    - domain: 'pdf.selflabs.org'
      policy: 'one_factor'
    # Só o painel do radar exige login; a landing, os shortlinks e os webhooks
    # seguem públicos. O matcher no Caddyfile garante que o Authelia nem seja
    # consultado fora de /admin, então o `resources` aqui é defesa em
    # profundidade: se aquele matcher for afrouxado, isto ainda segura.
    - domain: 'radar.selflabs.org'
      resources:
        - '^/admin([/?].*)?$'
      policy: 'one_factor'
    # Exemplo p/ restringir a um grupo do lldap:
    # - domain: 'pdf.selflabs.org'
    #   policy: 'two_factor'
    #   subject: ['group:admins']

# Sessão em memória (SEM Redis). O cookie no domínio-pai selflabs.org faz um
# login cobrir todos os *.selflabs.org (SSO). secret vem de AUTHELIA_SESSION_SECRET.
session:
  cookies:
    - domain: 'selflabs.org'
      authelia_url: 'https://auth.selflabs.org'
      default_redirection_url: 'https://pdf.selflabs.org'
      name: 'authelia_session'
      same_site: 'lax'
      inactivity: '5m'
      expiration: '1h'
      remember_me: '1M'

# Storage local SQLite (SEM Postgres). encryption_key vem de
# AUTHELIA_STORAGE_ENCRYPTION_KEY (obrigatório; FAÇA BACKUP).
storage:
  local:
    path: '/config/db.sqlite3'

# Notificador por e-mail (SMTP via Resend). Entrega os links de reset de senha e
# os códigos de verificação do registro de 2FA. A senha (API key `re_...` do
# Resend) vem da env AUTHELIA_NOTIFIER_SMTP_PASSWORD (ver a stack).
notifier:
  # O startup check faz um probe MAIL FROM/RCPT no boot; alguns relays (Resend)
  # podem recusá-lo e derrubar o Authelia. Desligado -> o SMTP é exercitado no
  # 1º uso real (reset/registro de 2FA). Teste manualmente após subir.
  disable_startup_check: true
  smtp:
    address: 'submission://smtp.resend.com:587'   # 587 = STARTTLS (scheme submission)
    username: 'resend'                            # usuário literal do Resend
    sender: 'Self-Labs <no-reply@selflabs.org>'   # remetente em domínio VERIFICADO no Resend
    identifier: 'selflabs.org'                    # HELO/EHLO
    subject: '[Self-Labs] {title}'

# 2FA por TOTP (Google Authenticator, Aegis, 2FAS, etc.). O usuário registra o
# app no portal auth.selflabs.org; o código de verificação do registro sai pelo
# SMTP acima. WebAuthn/passkeys é opcional (bloco `webauthn:`), não usado aqui.
totp:
  issuer: 'selflabs.org'
  period: 30
  skew: 1
