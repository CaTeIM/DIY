services:
  openlist:
    image: openlistteam/openlist:latest
    container_name: openlist
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    user: "0:0"
    environment:
      TZ: America/Sao_Paulo
      UMASK: "022"
    volumes:
      # Configuração e banco de dados do OpenList
      - /srv/openlist/config:/opt/openlist/data
      # Suas mídias existentes (somente leitura, adicionar :ro se não quiser escrita)
      - /srv/midia:/midia
    network_mode: bridge
    ports:
      - "5244:5244"   # Web UI + WebDAV + API
      - "5245:5245"   # HTTPS interno (opcional, usado se TLS for habilitado no container)
    hostname: openlist
